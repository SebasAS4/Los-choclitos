<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema de Almacén Básico - Kolcapp</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>Gestión de Inventario: Costo Promedio Ponderado</h1>
    </header>

    <main class="container">
        <section id="registro-producto" class="card">
            <h2>Módulo 1: Registro de Producto Nuevo</h2>
            <form id="form-registro">
                <div class="form-group">
                    <label for="codigo">Código del Producto:</label>
                    <input type="text" id="codigo" required placeholder="Ej: PROD001">
                </div>
                <div class="form-group">
                    <label for="nombre">Nombre del Producto:</label>
                    <input type="text" id="nombre" required placeholder="Ej: Rodamiento Industrial">
                </div>
                <div class="form-group">
                    <label for="stock-inicial">Stock Inicial:</label>
                    <input type="number" id="stock-inicial" min="0" step="1" required value="0">
                </div>
                <div class="form-group">
                    <label for="costo-inicial">Costo Unitario Inicial:</label>
                    <input type="number" id="costo-inicial" min="0" step="0.01" required value="0.00">
                </div>
                <button type="submit" class="btn-primary">Registrar e Iniciar Inventario</button>
            </form>
            <div id="mensaje-registro" class="mensaje"></div>
        </section>
    </main>

    <script src="script.js"></script>
</body>
</html>
